<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Einladung – E-App</title>

    <!--
      Vorschau-Zwischenseite für Einladungslinks (Wohnprofil teilen).
      Zweck: Link-Vorschauen (WhatsApp & Co. lesen nur die OG-Tags) zeigen klar
      eine EINLADUNG. Echte Besucher werden per JS sofort in die App auf die
      Beitritts-Seite (/join/<pid>/<inviteId>) weitergeleitet.
      Der eigentliche Link wird in profiles.ts (buildInviteLink) erzeugt:
      …/einladung.html?p=<pid>&i=<inviteId>
    -->

    <meta name="description" content="Einladung, ein Wohnprofil in der E-App gemeinsam zu nutzen." />
    <meta name="theme-color" content="#0b1108" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="E-App" />
    <meta property="og:title" content="Einladung: gemeinsames Wohnprofil" />
    <meta property="og:description" content="Du wurdest eingeladen, in der E-App ein Wohnprofil gemeinsam zu nutzen – Zählerstände, Verbrauch & Energiekosten zusammen im Blick. Tippe zum Beitreten." />
    <meta property="og:image" content="https://e-app-info.web.app/og-invite.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Einladung: gemeinsames Wohnprofil" />
    <meta name="twitter:description" content="Du wurdest eingeladen, in der E-App ein Wohnprofil gemeinsam zu nutzen. Tippe zum Beitreten." />
    <meta name="twitter:image" content="https://e-app-info.web.app/og-invite.png" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <style>
      html, body { margin: 0; height: 100%; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: radial-gradient(120% 130% at 50% 0%, #1c2b14 0%, #0b1108 60%, #050705 100%);
        color: #fff; display: grid; place-items: center; text-align: center; padding: 24px;
      }
      .card { max-width: 340px; }
      .spin {
        width: 34px; height: 34px; margin: 0 auto 16px; border-radius: 50%;
        border: 3px solid rgba(143,209,79,.25); border-top-color: #8fd14f;
        animation: spin .8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      h1 { font-size: 19px; font-weight: 700; margin: 0 0 6px; }
      p { font-size: 14px; color: #b9cca6; margin: 0; line-height: 1.45; }
      a.go {
        display: inline-block; margin-top: 18px; text-decoration: none;
        background: #4d7c0f; color: #fff; font-weight: 700; font-size: 15px;
        padding: 11px 22px; border-radius: 13px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="spin"></div>
      <h1>Einladung wird geöffnet …</h1>
      <p>Du wirst zur E-App weitergeleitet, um dem gemeinsamen Wohnprofil beizutreten.</p>
      <a id="go" class="go" href="/">Weiter zur E-App</a>
      <noscript>
        <p style="margin-top:14px">Bitte aktiviere JavaScript, um der Einladung beizutreten.</p>
      </noscript>
    </div>

    <script>
      (function () {
        var q = new URLSearchParams(location.search);
        var p = q.get('p');
        var i = q.get('i');
        // Verzeichnis der aktuellen Seite (funktioniert für / und /E-App/).
        var dir = location.pathname.replace(/einladung\.html$/, '');
        var go = document.getElementById('go');
        if (p && i) {
          var target = dir + 'join/' + encodeURIComponent(p) + '/' + encodeURIComponent(i);
          if (go) go.setAttribute('href', target);
          // Sofort weiterleiten (replace: kein zusätzlicher Verlaufseintrag).
          location.replace(target);
        } else if (go) {
          go.setAttribute('href', dir || '/');
        }
      })();
    </script>
  </body>
</html>
