<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>E-App – Neu</title>

    <!--
      NEUIGKEITEN-SEITE (öffentlich, ohne Login) · https://e-app-info.web.app/neu/
      Eine App-Ansicht ohne Scrollen: realistisches Phone-Mockup mit interaktivem
      Klick-Demo des Kamera-Scans. Self-contained (HTML/CSS/JS), kein Foto nötig.
      Künftige Updates: Texte unten (Headline/CTA/og) anpassen, nach main mergen.
    -->

    <meta name="description" content="Neu in der E-App: Zählerstände per Kamera automatisch erkennen." />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#F4F4F5" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#000000" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="E-App" />
    <meta property="og:title" content="Neu: Zählerstände einfach scannen" />
    <meta property="og:description" content="Kamera auf den Zähler halten – die E-App erkennt den Stand automatisch. Jetzt ausprobieren." />
    <meta property="og:image" content="https://e-app-info.web.app/logo.png" />
    <meta property="og:url" content="https://e-app-info.web.app/neu/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Neu: Zählerstände einfach scannen" />
    <meta name="twitter:description" content="Kamera auf den Zähler halten – die E-App erkennt den Stand automatisch." />
    <meta name="twitter:image" content="https://e-app-info.web.app/logo.png" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <style>
      :root {
        --bg1: #f4f4f5; --bg2: #e9e9ec;
        --text: #18181b; --muted: #71717a;
        --brand: #4d7c0f;
        --accent: #f97316;        /* Scan-Akzent (wie im Zähler-Screen) */
        --card: #0c0c0e;          /* App-Screen (dunkel, wie echt) */
      }
      @media (prefers-color-scheme: dark) {
        :root { --bg1: #0a0a0b; --bg2: #000; --text: #fafafa; --muted: #a1a1aa; --brand: #84cc16; }
      }
      * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
      html, body { height: 100%; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: var(--text);
        background: radial-gradient(130% 100% at 50% -10%, var(--bg1) 0%, var(--bg2) 100%);
        height: 100dvh; overflow: hidden;
        display: flex; flex-direction: column; align-items: center; justify-content: space-between;
        padding: calc(14px + env(safe-area-inset-top)) 18px calc(16px + env(safe-area-inset-bottom));
      }

      /* Kopf */
      .top { display: flex; align-items: center; gap: 9px; }
      .top img { width: 26px; height: 26px; border-radius: 7px; }
      .top .name { font-size: 15px; font-weight: 650; letter-spacing: -0.01em; }
      .top .new {
        font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
        color: var(--brand); border: 1px solid color-mix(in srgb, var(--brand) 40%, transparent);
        padding: 2px 7px; border-radius: 999px;
      }

      /* Gerät */
      .device {
        position: relative;
        height: min(62dvh, 560px); aspect-ratio: 300 / 620;
        background: linear-gradient(160deg, #3a3a3d, #131315);
        border-radius: 44px; padding: 5px;
        box-shadow: 0 30px 60px -20px rgba(0,0,0,0.55), 0 2px 6px rgba(0,0,0,0.3);
      }
      .screen {
        position: relative; height: 100%; width: 100%;
        background: var(--card); border-radius: 39px; overflow: hidden;
        display: flex; flex-direction: column;
      }
      /* dezente Glas-Reflexion */
      .screen::after {
        content: ""; position: absolute; inset: 0; pointer-events: none;
        background: linear-gradient(135deg, rgba(255,255,255,0.06), transparent 38%);
      }

      /* Statusleiste + Dynamic Island */
      .status {
        position: relative; height: 30px; flex: 0 0 auto;
        display: flex; align-items: center; justify-content: space-between;
        padding: 0 20px; color: #fff; font-size: 12px; font-weight: 600; z-index: 3;
      }
      .status .icons { display: flex; align-items: center; gap: 5px; }
      .island {
        position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
        width: 82px; height: 22px; background: #000; border-radius: 999px; z-index: 4;
        display: flex; align-items: center; justify-content: flex-end; padding-right: 9px;
      }
      .island .lens { width: 7px; height: 7px; border-radius: 50%; background: #1c2b33; box-shadow: inset 0 0 0 1px #2b3b44; }

      /* App-Kopf */
      .app-head {
        flex: 0 0 auto; display: flex; align-items: flex-start; justify-content: space-between;
        padding: 6px 16px 4px; color: #fff; z-index: 3;
      }
      .app-head .title { font-size: 14px; font-weight: 650; line-height: 1.15; }
      .app-head .sub { font-size: 11px; color: #a1a1aa; margin-top: 1px; }
      .app-head .x { width: 26px; height: 26px; display: grid; place-items: center; color: #d4d4d8; }

      /* Kamera-Ansicht */
      .view {
        position: relative; flex: 1 1 auto; min-height: 0;
        display: grid; place-items: center;
        background: radial-gradient(120% 80% at 50% 20%, #17171b 0%, #060607 75%);
      }
      .meter {
        display: flex; align-items: center; gap: 2px;
        padding: 6px 8px; border-radius: 7px;
        background: linear-gradient(#2b2924, #211f1b);
        box-shadow: inset 0 1px 2px rgba(0,0,0,0.7), 0 1px 0 rgba(255,255,255,0.05);
      }
      .meter .d {
        width: 17px; height: 24px; border-radius: 2px;
        display: grid; place-items: center; font-weight: 800; font-size: 15px;
        font-variant-numeric: tabular-nums;
        background: linear-gradient(#faf8f2, #e7e2d6); color: #17130c;
        box-shadow: inset 0 -5px 6px rgba(0,0,0,0.14), inset 0 5px 6px rgba(0,0,0,0.05);
      }
      .meter .d.red { background: linear-gradient(#cf4436, #b5352a); color: #fff; }
      .meter .comma { color: #faf8f2; font-weight: 800; font-size: 15px; align-self: flex-end; padding-bottom: 2px; }
      .meter .unit { color: #c7ccbf; font-size: 11px; margin-left: 3px; font-weight: 600; }

      .frame {
        position: absolute; width: 74%; height: 52px; border-radius: 8px; pointer-events: none;
        box-shadow: 0 0 0 100vmax rgba(0,0,0,0.42);
      }
      .frame > i {
        position: absolute; width: 16px; height: 16px; border: 2px solid var(--accent);
      }
      .frame > i:nth-child(1) { top: -1px; left: -1px; border-right: 0; border-bottom: 0; border-radius: 6px 0 0 0; }
      .frame > i:nth-child(2) { top: -1px; right: -1px; border-left: 0; border-bottom: 0; border-radius: 0 6px 0 0; }
      .frame > i:nth-child(3) { bottom: -1px; left: -1px; border-right: 0; border-top: 0; border-radius: 0 0 0 6px; }
      .frame > i:nth-child(4) { bottom: -1px; right: -1px; border-left: 0; border-top: 0; border-radius: 0 0 6px 0; }
      .laser {
        position: absolute; width: 70%; height: 2px;
        background: linear-gradient(90deg, transparent, var(--accent), transparent);
        box-shadow: 0 0 8px var(--accent);
        animation: laser 1.9s ease-in-out infinite;
      }
      @keyframes laser { 0%,100% { transform: translateY(-23px); opacity: .25 } 50% { transform: translateY(23px); opacity: 1 } }

      .proc { position: absolute; inset: 0; display: none; flex-direction: column;
        align-items: center; justify-content: center; gap: 9px; background: rgba(0,0,0,0.55); color: #fff; font-size: 12px; }
      .spin { width: 24px; height: 24px; border-radius: 50%; border: 3px solid rgba(255,255,255,.22); border-top-color: #fff; animation: spin .8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg) } }

      /* Steuer-Panel unten */
      .panel { flex: 0 0 auto; padding: 11px 14px calc(13px); background: #000; z-index: 3; }
      .pane { display: none; flex-direction: column; gap: 8px; }
      .pane .cap { text-align: center; color: #d4d4d8; font-size: 11px; }
      .value { text-align: center; color: #fff; font-weight: 800; font-size: 23px; font-variant-numeric: tabular-nums; }
      .value small { font-size: 12px; font-weight: 600; color: #a1a1aa; margin-left: 3px; }
      .last { text-align: center; color: #71717a; font-size: 10px; }
      .row { display: flex; gap: 7px; }
      .b { flex: 1; border: 0; cursor: pointer; font-family: inherit; font-weight: 700; font-size: 13px; padding: 11px; border-radius: 13px; transition: transform .1s ease, opacity .15s ease; }
      .b:active { transform: scale(.97); }
      .b.primary { background: var(--accent); color: #fff; }
      .b.ghost { background: rgba(255,255,255,.11); color: #fff; }
      .b.wide { width: 100%; }
      .done-check { width: 42px; height: 42px; margin: 2px auto 0; border-radius: 50%; display: grid; place-items: center; background: #22c55e; color: #fff; font-size: 22px; animation: pop .35s ease; }
      @keyframes pop { from { transform: scale(.4); opacity: 0 } to { transform: scale(1); opacity: 1 } }

      .screen[data-phase="processing"] .laser { display: none; }
      .screen[data-phase="processing"] .proc { display: flex; }
      .screen[data-phase="camera"] .pane-camera { display: flex; }
      .screen[data-phase="result"] .pane-result { display: flex; }
      .screen[data-phase="done"] .pane-done { display: flex; }

      /* Fuß: Headline + CTA */
      .foot { text-align: center; width: 100%; max-width: 340px; }
      .foot h1 { font-size: clamp(17px, 5vw, 20px); font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; }
      .foot p { color: var(--muted); font-size: 13px; margin-top: 4px; }
      .cta {
        display: inline-flex; align-items: center; gap: 7px; margin-top: 13px;
        text-decoration: none; background: var(--text); color: var(--bg2);
        font-weight: 700; font-size: 15px; padding: 12px 22px; border-radius: 14px;
        transition: transform .1s ease, opacity .15s ease;
      }
      .cta:active { transform: scale(.98); }

      @media (prefers-reduced-motion: reduce) { .laser, .spin, .done-check { animation: none } }
      @media (max-height: 620px) { .device { height: 58dvh } .foot h1 { font-size: 16px } }
    </style>
  </head>
  <body>
    <div class="top">
      <img src="/logo.png" alt="" />
      <span class="name">E-App</span>
      <span class="new">Neu</span>
    </div>

    <div class="device">
      <div class="screen" data-phase="camera">
        <div class="island"><span class="lens"></span></div>
        <div class="status">
          <span>9:41</span>
          <span class="icons">
            <svg width="17" height="11" viewBox="0 0 17 11" fill="#fff"><rect x="0" y="7" width="3" height="4" rx="1"/><rect x="4.5" y="5" width="3" height="6" rx="1"/><rect x="9" y="2.5" width="3" height="8.5" rx="1"/><rect x="13.5" y="0" width="3" height="11" rx="1"/></svg>
            <svg width="16" height="11" viewBox="0 0 16 12" fill="none"><path d="M8 10.2 1 4.4a10 10 0 0 1 14 0L8 10.2Z" stroke="#fff" stroke-width="1.3" opacity=".9"/><circle cx="8" cy="9.3" r="1.1" fill="#fff"/></svg>
            <svg width="24" height="12" viewBox="0 0 24 12" fill="none"><rect x="1" y="1.5" width="19" height="9" rx="2.5" stroke="#fff" opacity=".55"/><rect x="2.7" y="3.2" width="14" height="5.6" rx="1.3" fill="#fff"/><rect x="21" y="4" width="1.6" height="4" rx=".8" fill="#fff" opacity=".55"/></svg>
          </span>
        </div>

        <div class="app-head">
          <div>
            <div class="title">Zählerstand scannen</div>
            <div class="sub">Gas · m³</div>
          </div>
          <div class="x">
            <svg width="16" height="16" viewBox="0 0 16 16" stroke="currentColor" stroke-width="1.6"><path d="M4 4l8 8M12 4l-8 8"/></svg>
          </div>
        </div>

        <div class="view">
          <div class="meter">
            <span class="d">0</span><span class="d">7</span><span class="d">3</span><span class="d">5</span><span class="d">6</span><span class="comma">,</span><span class="d red">4</span><span class="d red">5</span><span class="d red">3</span><span class="unit">m³</span>
          </div>
          <div class="frame"><i></i><i></i><i></i><i></i></div>
          <div class="laser"></div>
          <div class="proc"><div class="spin"></div>Erkennung läuft…</div>
        </div>

        <div class="panel">
          <div class="pane pane-camera">
            <p class="cap">Ziffernzeile in den Rahmen halten</p>
            <button class="b primary wide" data-go="processing">Scannen</button>
          </div>
          <div class="pane pane-result">
            <p class="cap">Erkannt – bitte prüfen</p>
            <div class="value">7356,4<small>m³</small></div>
            <p class="last">Zuletzt: 7.353 m³</p>
            <div class="row">
              <button class="b ghost" data-go="camera">Neu scannen</button>
              <button class="b primary" data-go="done">Übernehmen</button>
            </div>
          </div>
          <div class="pane pane-done">
            <div class="done-check">
              <svg width="20" height="20" viewBox="0 0 20 20" stroke="#fff" stroke-width="2.2" fill="none"><path d="M4 10.5l4 4 8-9"/></svg>
            </div>
            <p class="cap">Gespeichert</p>
            <button class="b ghost wide" data-go="camera">Nochmal ansehen</button>
          </div>
        </div>
      </div>
    </div>

    <div class="foot">
      <h1>Zählerstände einfach scannen</h1>
      <p>Kamera auf den Zähler – die App erkennt den Stand.</p>
      <a class="cta" href="https://e-app-info.web.app/">
        Jetzt ausprobieren
        <svg width="15" height="15" viewBox="0 0 16 16" stroke="currentColor" stroke-width="1.8" fill="none"><path d="M3 8h9M8 4l4 4-4 4"/></svg>
      </a>
    </div>

    <script>
      document.querySelectorAll('[data-go]').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var s = btn.closest('.screen');
          var to = btn.getAttribute('data-go');
          if (to === 'processing') {
            s.dataset.phase = 'processing';
            setTimeout(function () { s.dataset.phase = 'result'; }, 1200);
          } else {
            s.dataset.phase = to;
          }
        });
      });
    </script>
  </body>
</html>
