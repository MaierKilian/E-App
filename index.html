<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Zählerstände, Verbrauch und Energiekosten im Blick behalten – gemeinsam mit deinem Haushalt." />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#FAFAFA" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#09090B" />

    <!-- Vorschau-Kärtchen für WhatsApp / Messenger / Social. Greift für alle
         In-App-Links (Start, Einladung /join, /monitoring …). Die konkrete
         Einladung steht zusätzlich im mitgeschickten Nachrichtentext. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="E-App" />
    <meta property="og:title" content="E-App – Energieanalyse für zuhause" />
    <meta property="og:description" content="Zählerstände, Verbrauch und Energiekosten im Blick – gemeinsam mit deinem Haushalt." />
    <meta property="og:image" content="https://e-app-info.web.app/og-cover.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://e-app-info.web.app/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="E-App – Energieanalyse für zuhause" />
    <meta name="twitter:description" content="Zählerstände, Verbrauch und Energiekosten im Blick – gemeinsam mit deinem Haushalt." />
    <meta name="twitter:image" content="https://e-app-info.web.app/og-cover.png" />
    <title>E-App</title>
    <script>
      // Theme früh setzen, um ein Aufblitzen beim Laden zu vermeiden (no-FOUC).
      try {
        var raw = localStorage.getItem('eapp-settings');
        var theme = raw ? JSON.parse(raw).state.theme : null;
        if (!theme) {
          // Neue Nutzer: Geräte-Theme (hell/dunkel) als Standard.
          theme =
            window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
        }
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
