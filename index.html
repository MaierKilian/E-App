<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="E-App – selbst durchführbare Energieanalyse im Haushalt." />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#FAFAFA" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#09090B" />
    <title>E-App</title>
    <script>
      // Theme früh setzen, um ein Aufblitzen beim Laden zu vermeiden (no-FOUC).
      try {
        var raw = localStorage.getItem('eapp-settings');
        var theme = raw ? JSON.parse(raw).state.theme : null;
        document.documentElement.setAttribute('data-theme', theme || 'light');
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
